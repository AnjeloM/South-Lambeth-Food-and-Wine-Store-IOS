<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – South Lambeth Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1c1c1e;
      border: 1px solid #2c2c2e;
      border-radius: 18px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: 15px; color: #a0a0a0; line-height: 1.55; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #D6D000;
      color: #000;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 999px;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .note { margin-top: 20px; font-size: 13px; color: #666; }
    .error { display: none; margin-top: 16px; color: #ff453a; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Reset Your Password</h1>
    <p id="msg">Opening the South Lambeth Store app…</p>
    <a id="openBtn" class="btn" style="display:none">Open App</a>
    <p class="note" id="note" style="display:none">
      Open this link on the iPhone where the app is installed.
    </p>
    <p class="error" id="err"></p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token  = params.get("token");

      if (!token) {
        document.getElementById("msg").textContent =
          "This link is invalid or has already been used.";
        return;
      }

      var deepLink = "inventorysys://reset?token=" + encodeURIComponent(token);

      // Attempt to open the app immediately
      window.location.href = deepLink;

      // After 2 s show fallback UI if we're still on this page
      setTimeout(function () {
        document.getElementById("msg").textContent =
          "Couldn't open the app automatically.";
        var btn = document.getElementById("openBtn");
        btn.href = deepLink;
        btn.style.display = "inline-block";
        document.getElementById("note").style.display = "block";
      }, 2000);
    })();
  </script>
</body>
</html>
